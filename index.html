            const artworks = [
  { id: 1, year: "2024", title: "은혜의 단비 - 평안을 너에게 주노라", info: "Mixed media on canvas, 65.1×53.0cm (15호F)", description: "주님 주시는 평안은 세상이 주는 것과 같지 않습니다 두려워 말고 불안해 하지 말고 평안하길 은혜의 단비가 봄비처럼 내립니다", imageUrl: "images/2.jpg", thumbUrl: "thumb/2.jpg" },
  { id: 2, year: "2024", title: "은혜의 단비 - 하나 된 부부", info: "Mixed media on canvas, 40.9×31.8cm(6호P)", description: "하나님이 주신 배우자와 서로 사랑하며 용납하고 하나 된 부부의 모습을 하나님이 칭찬하실꺼라는 마음으로 따뜻하고 빛나는 표현하였습니다", imageUrl: "images/3.jpg", thumbUrl: "thumb/3.jpg" },
  { id: 3, year: "2024", title: "은혜의 단비 - 함께 찬양하는 부부", info: "Mixed media on canvas, 72.7×60.6cm(20호P)", description: "하나님이 주신 배우자와 서로 사랑하며 용납하고 함께 찬양하는 부부의 모습에서 우리는 아름다운 영향력을 끼쳐 하나님이 칭찬하실꺼라는 마음으로 따뜻하고 빛나는 표현을 하였습니다", imageUrl: "images/4.jpg", thumbUrl: "thumb/4.jpg" },
  { id: 4, year: "2022", title: "겟세마네 동산의 감람나무 - 십자가 사랑", info: "Mixed media on canvas, 130×130cm (100호 정방)", description: "우리 위해 십자가 지시기 전날 밤 겟세마네 동산에서 땀이 핏방울이 되도록 기도하셨던 예수님의 그 사랑을 묵상하며 그렸습니다. 실제 겟세마네 동산에 있는 2000년이 넘은 예수님 당시의 감람나무(올리브나무)입니다.", imageUrl: "images/5.jpg", thumbUrl: "thumb/5.jpg" },
  { id: 5, year: "2022", title: "모세의 찬양 (신명기32장)", info: "Mixed media on canvas, 130×130cm (100호 정방)", description: "우리나라의 두번째로 오래된 은행나무입니다. 천년이 넘은 나무를 보면 긴 세월을 견디며 잘 살아낸 어르신의 모습이 떠오릅니다. 주름진 환한 얼굴로 두팔 벌려 '이 모든일을 하나님이 이루셨도다.' 고백하며 찬양하는 광야 끝의 모세가 보입니다. 은혜의 단비가 내리는 질감 위에 풀과 나무가 하늘을 향해 찬양합니다. 주님 경배를 받으소서 (우리나라의 두번째로 오래된 천년이 넘은 은행나무로 긴 세월을 견디며 잘 살아내신 어르신이 하늘 향해 노래하는 모습을 떠올리며 작업하였습니다. 신명기 32장은 하나님의 주권적인 구원의 역사를 고백하며, 백성들에게 하나님의 은혜를 잊지 말고 순종할 것을 당부하는 모세의 메시지를 담고 있습니다. 주름진 환한 얼굴로 광야를 이끌어 주신 하나님께 두팔 벌려 '이 모든일을 하나님이 이루셨도다.' 고백하며 찬양하는 광야의 모세를 생각하며 작업하였습니다. 은혜의 단비가 내리는 질감 위에 풀과 나무가 하늘을 향해 찬양합니다 주님 경배를 받으소서)", imageUrl: "images/6.jpg", thumbUrl: "thumb/6.jpg" },
  { id: 6, year: "2020", title: "갈릴리 바다 - 그 사랑", info: "Mixed media on canvas, 90.9×45.3cm (30호 변형)", description: "예수님이 부활하신 후 제자들에게 갈릴리바다에서 만나자 하십니다 예수님은 그 언덕 어디에선가 숯불에 물고기를 굽고 계셨습니다 닭이 울기 전 예수님을 세번 배반했던 베드로에게 따듯한 시선으로 \"네가 날 사랑하느냐\" 물으시고 \"내 양을 먹이라\" 세 번 말씀하십니다. 꾸짖지 않으시고 회복시키시는 주님의 그 사랑을 묵상하며 따뜻하게 표현하였습니다.", imageUrl: "images/7.jpg", thumbUrl: "thumb/7.jpg" },
  { id: 7, year: "2022", title: "변하는 계절의 모든 순간이 당연한 것 아니라 은혜입니다.", info: "Mixed media on canvas, 90.9×45.3cm (30호 변형×2)", description: "'은혜'라는 찬양을 할때 마다 우리나라의 계절의 변화를 그려 감사의 예배를 드려야겠다는 마음을 주셨습니다. 캔버스 부터 변형으로 주문 제작하여 시냇가에 심은 나무의 봄과 가을을 그리며 특히 하늘 표현에 공들였습니다.", imageUrl: "images/8.jpg", thumbUrl: "thumb/8.jpg" },
  { id: 8, year: "2021", title: "종려나무 - 호산나", info: "Mixed media on canvas, 65.1×45.5cm (12호P)", description: "초막절에는 종려나무 가지를 흔들며 40년 동안의 광야 생활을 기념했습니다. 젖과 꿀이 흐르는 땅의 '꿀'이 대추야자(종려나무) 열매를 일컫는 답니다. 종려나무는 존경과 기쁨, 승리와 번영을 상징합니다. 그림의 배경은 사해 바다입니다.", imageUrl: "images/9.jpg", thumbUrl: "thumb/9.jpg" },
  { id: 9, year: "2021", title: "종려나무 - 호산나II", info: "Mixed media on canvas, 53.0×40.9cm (10호P)", description: "예수님께서 예루살렘 입성하실 때 이스라엘 백성들은 자기의 겉옷을 바닥에 깔고 종려나무 가지를 흔들며 호산나를 외쳤습니다 호산나는 '구하옵나니 우리를 구원하소서' 라는 뜻의 히브리어입니다 은혜의 단비를 상징하는 깊은 질감 위에 구원의 소망을 담아 종려가지가 흔들리는 듯 표현했습니다.", imageUrl: "images/10.jpg", thumbUrl: "thumb/10.jpg" },
  { id: 10, year: "2021", title: "야곱의 고백 - 하나님이 여기 계시도다", info: "Mixed media on canvas, 53.0×45.5cm (10호F)", description: "천사들이 사닥다리를 오르락 내리락 하는 꿈을 꾼 야곱이 돌단을 쌓고 예배를 드립니다. 광야에서 외롭게 홀로 있던 야곱은 \"여호와께서 이 곳에 계시도다\" 고백합니다. 우리가 서 있는 이 곳에 하나님이 계십니다!", imageUrl: "images/11.jpg", thumbUrl: "thumb/11.jpg" },
  { id: 11, year: "2021", title: "우슬초로 정결케 하소서", info: "Mixed media on canvas, 72.7×60.6cm (20호F)", description: "우슬초는 잎사귀에 털이 있어서 양의 피를 묻히는 붓의 역할을 했습니다. 출애굽 할때 문설주에 발라 죽임이 건너가서 구원을 상징합니다. 다윗이 나단 선지자에게 혼나고 바로 자복하며 눈물로 쓴 시가 '우슬초로 나를 정결케 하소서' 입니다. 우리는 분홍색처럼 단장하며 잘 살고 있는 것처럼 보이지만 날마다 구원을 구해야하는 연약한 존재입니다.", imageUrl: "images/12.jpg", thumbUrl: "thumb/12.jpg" },
  { id: 12, year: "2022", title: "은혜의 단비 - 꽃들도", info: "Mixed media on canvas, 72.7×60.6cm (20호F)", description: "꽃들도 구름도~찬양하라 '들에 핀 백합화'는 이스라엘에 지천으로 피어있는 들꽃인 빨간 개양귀비 꽃입니다. 솔로몬의 모든 영광으로도 입은 것이 백합화 꽃 하나만도 못하였다”(마 6:29)는 말씀처럼 우린 영려하지 말고 감사로 찬양하는 믿음의 사람이 되길 소망하는 마음으로 작업하였습니다.", imageUrl: "images/13.jpg", thumbUrl: "thumb/13.jpg" },
  { id: 13, year: "2019", title: "삭개오의 뽕나무(돌 무화과 나무)", info: "Mixed media on canvas, 116.8×80.3cm (6호F)", description: "뽕나무 역시 돌무화과 나무입니다. 두 나무의 비슷한점은 가지가 밑에서 부터 갈라져 키 작은 삭개오가 올라가기 쉬운 나무입니다. 예수님을 보고자 뽕나무(돌무화과 나무)에 올라간 삭개오를 예수님이 부르십니다. 내가 오늘 너의 집에 유하리라. 감격한 삭개오는 잘못 징수한 세금을 네배로 갚겠다 합니다.", imageUrl: "images/14.jpg", thumbUrl: "thumb/14.jpg" },
  { id: 14, year: "2021", title: "거룩한 나무 싯딤나무", info: "Mixed media on canvas, 116.8×80.3cm (50호F)", description: "싯딤나무는 지성소에 들어가는 십계명을 넣은 언약궤를 만들때 이 나무로 만들라고 하나님께서 명령하신 나무입니다. 거룩한 나무라는 별명을 가진 싯딤나무는 뿌리가 몇백미터(기네스북에는 몇천미터)를 내려가기에 광야에 유일하게 서 있을 수 있고 그늘을 만드는 나무입니다. 우리도 광야 같은 세상에서 말씀에 뿌리를 내려 거룩하게 쓰임 받기를, 그리고 그늘이 되는 사람이기를 기도하며 은혜의 단비 마티에르 위에 작업하였습니다. 싯딤나무는 지성소에 들어가는 십계명을 넣은 언약궤를 만들때 이 나무로 만들라고 하나님께서 명령하신 거룩한 나무라는 별명을 가진 나무입니다. 수원을 찾아 뿌리가 몇백미터(기네스북에는 몇천미터)를 내려가기에 광야에 유일하게 서 있을 수 있습니다. 우리도 광야 같은 세상에서 말씀에 뿌리를 내려 거룩하게 쓰임 받기를, 그리고 그늘이 되는 사람이기를 기도합니다.", imageUrl: "images/15.jpg", thumbUrl: "thumb/15.jpg" },
  { id: 15, year: "2021", title: "은혜의 단비 - 생명의 노래", info: "Mixed media on canvas, 116.8×80.3cm (50호F)", description: "시냇가에 심은 나무입니다. 양재천의 나무로 은혜의 단비를 상징하는 질감을 강조한 프레임 안에 뒷 배경인 타워팰리스를 작게 낮추고 나무가 주인공이 되어 생명의 노래를 멋지게 부르는 모습으로 작업하였습니다.", imageUrl: "images/16.jpg", thumbUrl: "thumb/16.jpg" },
  { id: 16, year: "2019", title: "그늘을 만드는 싯딤나무", info: "Mixed media on canvas, 116.8×80.3cm (30호P)", description: "뜨거운 광활한 광야에서 어쩌다가 서 있는 싯딤나무를 만나면 동물과 사람은 너무 반갑고 고맙습니다. 말씀의 뿌리를 내려 우리도 이 광야 같은 세상에서 시원한 그늘을 제공하는 고마운 예배자가 되길 기도하는 마음으로 작업하였습니다.", imageUrl: "images/17.jpg", thumbUrl: "thumb/17.jpg" },
  { id: 17, year: "2020", title: "로뎀나무 - 회복의 자리", info: "Mixed media on canvas, 72.7×60.6cm (20호P)", description: "능력의 선지자 엘리야가 로뎀나무 그늘 아래에 두려움으로 쓰러져 있을 때 천사를 보내 떡과 물을 먹이시고 회복을 주신 하나님을 기억하며 어려운 이 때 우리 모두 로뎀나무 그늘 아래에서 처럼 회복되어 일어서기를 기도하며 작업하였습니다. 밑 작업의 질감은 은혜의 단비를 표현한 것입니다. (*로뎀나무는 그늘이라 할 수 없을 만큼 작은 그림자를 제공하는 우리나라의 대싸리나무와 같은 나무입니다.)", imageUrl: "images/18.jpg", thumbUrl: "thumb/18.jpg" },
  { id: 18, year: "2017", title: "은혜의 단비 - 향기", info: "Mixed media on canvas, 90.9×60.6cm (30호M)", description: "우리는 그리스도의 향기입니다. 어느 곳에나 내리는 하나님의 사랑을 은혜의 단비로 수직의 질감을 표현하고 그 위에 흐드러지게 피는 벚꽃으로 향기 내며 살고 싶은 소망을 담아 기도하며 작업하였습니다. 항상 우리를 그리스도 안에서 이기게 하시고 우리로 말미암아 각처에서 그리스도를 아는 냄새를 나타내시는 하나님께 감사하노라 우리는 구원 받는 자들에게나 망하는 자들에게나 하나님 앞에서 그리스도의 향기니 (고후 2:14,15)", imageUrl: "images/19.jpg", thumbUrl: "thumb/19.jpg" },
  { id: 19, year: "2020", title: "바라보기 - 찬양", info: "Mixed media on canvas, 60.5×43.5cm (12호 변형)", description: "이번에는 하늘을 그리고 싶어 질감을 내지 않았습니다. 바삐 사는 우리가 멈춰 서서 하늘 한번 쳐다보면 좋겠다는 맘으로 작업하였습니다. 이 그림의 주인공은 구름입니다. 우리가 하늘을 쳐다보며 성령이 비둘기 같이 임하길 기도합니다.", imageUrl: "images/20.jpg", thumbUrl: "thumb/20.jpg" },
  { id: 20, year: "2021", title: "찬양의 꽃다발", info: "Mixed media on canvas, 40.9×31.8cm (6호F)", description: "하나님께서 사람을 만드신 목적은 찬양 받기 위함입니다. 우리의 찬양의 꽃다발을 올려드리 듯이 풀어 표현하였습니다", imageUrl: "images/21.jpg", thumbUrl: "thumb/21.jpg" },
  { id: 21, year: "", title: "물이 바다 덮음 같이 - His Glory", info: "Pigment print on canvas, 116.8×80.3cm (30호F 판화)", description: "예수님께서 제자로 부르시고 '내 양을 먹이라' 사명을 주신 자리 갈릴리바다 입니다 갈릴리바다에 물이 차오르는 것 같은 표현을 하면서 이 혼란스럽고 어지러운 세상이 회복되어 인본주의가 아닌, 주 하나님만이 하나님이시라는 하나님의 영광을 온세상에 선포하는 마음으로 기도하며 작업하였습니다. \"물이 바다 덮음 같이 여호와의 영광을 인정하는 것이 온 세상 가득하리라\"(창2:14)", imageUrl: "images/22.jpg", thumbUrl: "thumb/22.jpg" },
  { id: 22, year: "2023", title: "은혜의 단비 - 감람나무 (올리브나무)", info: "Mixed media on canvas, 60.6×50.0cm (12호F)", description: "빛을 받은 축복의 감람나무입니다. 이스라엘에서는 나무의 왕으로 여기는 올리브나무는 기름부음의 상징이고 식탁에 둘러앉은 축복의 어린자녀를 칭합니다.", imageUrl: "images/23.jpg", thumbUrl: "thumb/23.jpg" },
  { id: 23, year: "2019", title: "성령의 단비를 부어 새생명 주옵소서", info: "Mixed media on canvas, 45.5×27.3cm (8호M)", description: "우리 믿음의 사람은 안개 속 같은 회색 빛 세상에서 숨어 있는 자가 아닌, 색을 드러내며 빛으로 거룩하게 구별된 사람으로 살아내야 하는 소망의 기도로, 나무만 드러나는 색을 입혀 표현했습니다.", imageUrl: "images/24.jpg", thumbUrl: "thumb/24.jpg" },
  { id: 24, year: "2019", title: "그 사랑 얼마나 아름다운지", info: "Mixed media on canvas, 72.7×53.0cm (20호P)", description: "'다 표현 못해도 나 표현하리라~' 이 찬양은 저의 그림 그리는 '주제가' 입니다. 우리 위해 십자가를 지신 예수님의 그 사랑이 얼마나 아름다운지! 다 는 표현 못해도 제가 표현하겠습니다. 고백하며 작업합니다. 벛꽃으로 찬양하는 그림을 많이 그리는데 이 그림은 벛꽃과 하늘을 더 아름답게 색을 내어 예수님의 사랑을 표현하고 싶었습니다. 조금 멀리서 보시면 입체적으로 보이실겁니다. 이 그림을 보시는 분들도 그 사랑의 찬양이 흘러 나오길 기도합니다.", imageUrl: "images/25.jpg", thumbUrl: "thumb/25.jpg" },
  { id: 25, year: "2023", title: "은혜의 단비 ㅡ 함께 찬양", info: "Mixed media on canvas, 53.0×45.5cm (10호F)", description: "함께함이 은혜입니다. 우리는 함께 공동체를 이루고 살아야 행복하도록 지어졌습니다. 함께 모여있는 꽃으로 하늘 향해 찬양하는 마음으로 표현했습니다.", imageUrl: "images/26.jpg", thumbUrl: "thumb/26.jpg" },
  { id: 26, year: "2023", title: "은혜의 단비 ㅡ 가을의 찬양", info: "Mixed media on canvas, 116.8×80.3cm (50호F)", description: "계절의 변하는 모든 순간이 은혜입니다. 가을의 아름다운 단풍의 색을 아름답게 환상적으로 표현하며, 어찌 이리 아름다운 자연을 주셨는지 감사하는 마음을 올려드렸습니다.", imageUrl: "images/27.jpg", thumbUrl: "thumb/27.jpg" },
  { id: 27, year: "", title: "은혜의 단비 - 싯딤나무", info: "Pigment digital print on canvas, 53.0×45.5cm (10호P 판화)", description: "광야에서 유일하게 서 있는 싯딤나무는 언약궤를 만들때 사용되어진 거룩한 나무입니다. 뜨거운 땅에서 걸을때 만나면 너무도 고마운, 스스로 그늘을 만드는 나무입니다. 뿌리가 몇백미터를 내려가는 싯딤나무처럼 우리도 말씀의 뿌리를 내리어 쓰임 받기를 기도합니다.", imageUrl: "images/28.jpg", thumbUrl: "thumb/28.jpg" },
  { id: 28, year: "", title: "아브라함의 에셀나무 - 예배의 자리", info: "Pigment digital print on canvas, 53.0×45.5cm (10호P 판화)", description: "아브라함이 아비멜렉과 화친을 맺은 후 예배의 마음으로 에셀나무를 심었습니다. 에셀나무의 그늘은 10도 정도 차이가 날 정도로 시원합니다. 새벽에 맺히는 이슬은 황홀할 정도로 아름답습니다.", imageUrl: "images/29.jpg", thumbUrl: "thumb/29.jpg" },
  { id: 29, year: "", title: "거룩한 나무 싯딤나무", info: "Pigment digital print on canvas, 53.0×45.5cm (10호P)", description: "", imageUrl: "images/30.jpg", thumbUrl: "thumb/30.jpg" },
  { id: 30, year: "2023", title: "은혜의 단비 - 감람나무 (올리브나무)", info: "Mixed media on canvas, 41.0×31.8cm (6호F)", description: "축복의 감람나무입니다. 이스라엘에서는 나무의 왕으로 여기며 올리브 열매는 기름부음의 상징이고 '식탁에 둘러앉은 자녀들은 어린 감람나무 같을 것이요' 라는 축복의 말씀을 묵상하며 작업하였습니다", imageUrl: "images/31.jpg", thumbUrl: "thumb/31.jpg" },
  { id: 31, year: "", title: "은혜의 단비 ㅡ 기도의 땅", info: "Mixed media on canvas, 33.3×24.2cm (4호)", description: "믿음을 지키려 핍박을 피해 터키 갑바도기아 라는 곳 동굴에 숨어 지내던 곳을 나무와 함께 기도의 땅을 그리며 우리도 광야 같은 세상에서 믿음을 단단히 지키며 살아가길 기도합니다", imageUrl: "images/32.jpg", thumbUrl: "thumb/32.jpg" },
  { id: 32, year: "", title: "비 오는 날의 축복", info: "65.1×53cm (15호P), Mixed media on canvas", description: "은혜의 단비로 버드나무가 더욱 밝은 녹색을 발하며 하나님의 찬양합니다 두물머리의 버드나무입니다 버드나무도 성경 속 식물입니다 초막절 때 종려나무와 함께 버드나무를 흔들며 광야를 인도하신 하나님을 기념합니다 시냇가에 많이 심겨진 축복의 나무입니다", imageUrl: "images/33.jpg", thumbUrl: "thumb/33.jpg" },
  { id: 33, year: "", title: "은혜의 단비 - 몽마르트 언덕", info: "53.0×45.5cm, Mixed media on canvas", description: "보이지 않지만 어느 곳에나 은혜의 단비가 내립니다. 파리 몽마르트 언덕에서 내려다 보이는 풍경을 그리며 그곳에도 하나님의 사랑을 느끼고 경험하길 기도하는 마음으로 작업하였습니다.", imageUrl: "images/34.jpg", thumbUrl: "thumb/34.jpg" },
  { id: 34, year: "", title: "은혜의 단비 - 윤슬", info: "33.4×24.2cm, Mixed media on canvas", description: "강물에 빛을 받아 반짝이는 것을 순 우리말로 '윤슬' 이라고 합니다 빛을 받은 윤슬처럼 반짝이는 삶을 살길 기도합니다", imageUrl: "images/35.jpg", thumbUrl: "thumb/35.jpg" },
  { id: 35, year: "", title: "은혜의 단비 - 가을 찬양", info: "30×30cm, Mixed media on canvas", description: "변하는 계절의 모든 순간이 당연한 것 아니라 은혜입니다. 가을의 단풍으로 아름다운 계절을 주신 분께 감사하는 마음을 올려드렸습니다.", imageUrl: "images/36.jpg", thumbUrl: "thumb/36.jpg" },
  { id: 36, year: "", title: "은혜의 단비 - 새벽으로 가는 길", info: "60.6×60.6cm, Mixed media on canvas", description: "어두운 땅에 새벽이 오고 있습니다. 북한 땅을 향한 하나님의 마음을 묵상하며 기도하며 그렸습니다. 보이지 않는 은혜의 단비가 내립니다", imageUrl: "images/37.jpg", thumbUrl: "thumb/37.jpg" },

                                        <h3 className="text-3xl font-light mt-4 mb-8">{columns[activeColumnIdx].title}</h3>
                                    </div>
                                    <div className="text-neutral-700 leading-loose font-light whitespace-pre-wrap text-lg bg-neutral-50 p-10 rounded-sm">
                                        {columns[activeColumnIdx].content}
                                    </div>
                                </article>

                                <div className="pt-20 space-y-10">
                                    <div className="flex items-center gap-4">
                                        <div className="h-[1px] flex-1 bg-neutral-100"></div>
                                        <h4 className="text-[11px] uppercase tracking-[0.3em] text-neutral-400 font-bold">Related Works</h4>
                                        <div className="h-[1px] flex-1 bg-neutral-100"></div>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-8">
                                        {artworks
                                            .filter(work => columns[activeColumnIdx].relatedWorkIds.includes(work.id))
                                            .map(work => (
                                                <div key={work.id} className="group cursor-pointer space-y-4" onClick={() => setSelectedWork(work)}>
                                                    <div className="aspect-[3/4] overflow-hidden bg-neutral-50 border border-neutral-100">
                                                        <img src={work.imageUrl} alt={work.title} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                                    </div>
                                                    <h5 className="text-sm font-light tracking-tight text-center group-hover:text-neutral-500">{work.title}</h5>
                                                </div>
                                            ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. 평론 Section */}
                        {activeSection === 'review' && (
                            <div className="max-w-4xl mx-auto animate-fade-in">
                                <header className="text-center mb-16 space-y-4">
                                    <h2 className="text-5xl font-extralight tracking-tight">Review</h2>
                                    <p className="text-neutral-400 text-xs uppercase tracking-[0.3em]">Critical Essays</p>
                                </header>
                                <div className="flex border-b border-neutral-100 mb-12">
                                    <button onClick={() => setActiveReviewTab(0)} className={`flex-1 py-4 text-xs tracking-widest uppercase transition-all ${activeReviewTab === 0 ? 'text-black font-bold border-b-2 border-black' : 'text-neutral-300'}`}>01. 금보성 평론</button>
                                    <button onClick={() => setActiveReviewTab(1)} className={`flex-1 py-4 text-xs tracking-widest uppercase transition-all ${activeReviewTab === 1 ? 'text-black font-bold border-b-2 border-black' : 'text-neutral-300'}`}>02. 이재언 평론</button>
                                </div>
                                <div className="prose prose-neutral max-w-none pb-20">
                                    {activeReviewTab === 0 ? (
                                        <div className="space-y-8 text-neutral-800 font-light">
                                            <div className="text-center mb-16">
                                                <h3 className="text-2xl font-light mb-4">[김준영.떨림의 미학] 금보성 평론</h3>
                                                <p className="text-neutral-500 font-normal">- 풍경 위에 내리는 은혜의 결 -</p>
                                            </div>
                                            <p>오늘날 풍경화는 더 이상 자연을 재현하는 장르가 아니다. 사진과 영상, 드론과 위성 이미지가 자연을 압도적으로 포획하는 시대에, 회화가 다시 풍경을 그린다는 것은 단순한 회귀가 아니라 존재에 대한 태도의 선언에 가깝다. 김준영의 회화는 바로 그 지점에서 시작한다. 그의 작품은 자연을 보여주기보다, 자연 앞에 선 인간의 내적 상태를 드러낸다. 그리고 그 내적 상태를 지배하는 핵심 감각은 하나다. 떨림—보이는 세계가 신 앞에서, 혹은 침묵 앞에서 미세하게 흔들리는 감각.</p>
                                            <p>김준영의 풍경을 처음 마주하면 고요하다. 분홍빛으로 물든 하늘, 물가에 선 풀과 나무, 저녁 무렵의 도시와 호수, 숲의 깊은 그늘, 정적인 수면. 그러나 이 고요는 정지된 침묵이 아니다. 작품을 가까이에서 들여다보는 순간, 화면 전체를 가득 채운 미세한 수직의 선들이 시선을 붙잡는다. 그 선들은 표면 위의 질감이면서 동시에, 작가가 세계를 견디는 방식이며, 신앙이 작동하는 방식—즉 은혜가 스며드는 시간의 리듬이다.</p>
                                            <h4 className="text-lg font-normal pt-4">1) ‘풍경의 떨림’이라는 문자적 의미: 바람(風)과 장면(景)의 흔들리는 존재론</h4>
                                            <p>‘풍경(風景)’은 본래 바람과 장면이 결합된 말이다. 풍경은 원래부터 고정된 배경이 아니라, 바람에 의해 끊임없이 달라지는상태의 장(場)이다. 김준영은 이 문자적 의미를 회화적으로 복원한다. 그의 풍경은 “멈춰 있는 자연”이 아니라 “항상 미세하게 진동하는 세계”다.</p>
                                            <p>여기서 떨림은 단순한 흔들림이 아니다. 붕괴가 아니라 살아 있음의 증거다. 떨림은 어떤 존재가 완전히 굳어지지 않았다는 뜻이며, 외부와의 접촉 앞에서 여전히 감응하고 있다는 뜻이다. 김준영의 풍경에서 하늘은 평온하지만 평면적이지 않고, 나무는 서 있으되 미세하게 흔들리며, 물은 고요하나 끊임없이 작은 파장을 만든다. 이 모든 것은 “자연의 모습”을 넘어, 자연 앞에서 인간이 경험하는 내면의 진동을 암시한다.</p>
                                            <h4 className="text-lg font-normal pt-4">2) ‘현대 풍경’의 외피를 입은 신앙고백</h4>
                                            <p>김준영의 작업은 전통적 사실주의 풍경과 분명히 거리를 둔다. 그는 자연을 ‘보이는 대로’ 재현하지 않는다. 오히려 자연을 통해 감각·시간·침묵·기도를 드러낸다. 미술사적으로 그의 위치는 하나로 고정되기보다 여러 흐름이 겹친 교차점에 놓인다.<br/>현대 풍경 회화(Contemporary Landscape Painting)는 자연을 대상화하기보다 ‘관계’와 ‘상태’로 다루는 풍경이다. 서정적 리얼리즘(Lyrical Realism)은 현실의 장면을 지키되 감정의 기압(氣壓)으로 변형시키는 회화이다.  명상적·영적 회화(Meditative/Spiritual Painting) 설명보다 체험을, 메시지보다 침묵의 지속을 우선시 한다.</p>
                                            <p>동시에 동양 산수화의 기운생동(氣韻生동)과 여백 사유가 연상된다. 형상을 고정하기보다 ‘기운의 흐름’과 ‘머무는 공기’를 포착하려는 태도다. 그러나 김준영은 전통을 답습하지 않는다. 그는 동양의 사유를 현대 회화의 표면 위로 끌어오며, 그 표면을 통해 “감응하는 세계”를 만든다.</p>
                                            <h4 className="text-lg font-normal pt-4">3) 작품의 ‘미세한 선’—은혜의 단비, 기도의 결</h4>
                                            <p>김준영 회화의 진짜 중심은 멀리서보다 가까이에서 열린다. 화면을 확대하면, 표면 전체에 걸쳐 반복되는 수많은 가는 선들이 보인다. 이 선들은 대체로 수직 방향으로 내려오며, 다음과 같은 이중 의미를 발생시킨다.<br/>1.자연현상으로서의 선: 나 빗방울, 안개, 습도, 빛의 떨림, 공기의 결<br/>2.신앙적 은유로서의 선:위에서 아래로 스며드는 은혜, 말보다 먼저 오는 위로, 침묵 속의 응답</p>
                                            <p>중요한 것은 이 선들이 ‘효과’를 위해 존재하지 않는다는 점이다. 이 반복적 붓질은 작가의 태도, 즉 수행성을 드러낸다. 한 줄 한 줄은 크고 극적인 제스처가 아니라, 오히려 미미하고 조용하다. 그러나 바로 그 미미함이 누적될 때, 화면은 깊이를 얻는다. 김준영이 그리는 것은 풍경이 아니라 은혜가 쌓이는 방식이다.</p>
                                            <p>신앙에서 은혜는 종종 폭우처럼 ‘한 번에’ 쏟아지는 사건으로 이해되지만, 실제의 은혜는 대개 단비처럼 도착한다. 소리 없이, 어느 순간 “이미 젖어 있었다”는 방식으로. 김준영의 미세한 선들은 그 단비의 시간, 즉 인지의 문턱 아래에서 진행되는 구원을 시각화한다.</p>
                                            <h4 className="text-lg font-normal pt-4">4) 신앙적 떨림</h4>
                                            <p>김준영 작품에서 종교적 상징은 거의 등장하지 않는다. 십자가도, 서사도, 명시적 교훈도 없다. 그럼에도 그의 풍경은 분명 신앙적이다. 이는 그가 신앙을 “보여줘야 할 이미지”가 아니라 “세계를 바라보는 시선의 구조”로 이해하기 때문이다.</p>
                                            <p>신앙적 떨림은 공포가 아니다. 그것은 경외(敬畏)다. 인간이 자기보다 큰 것—자연, 시간, 신, 혹은 침묵—앞에서 느끼는 존재의 미세한 흔들림이다. 김준영의 풍경은 바로 그 흔들림을 과장하지 않고, 오히려 최소화하여 드러낸다. 그래서 이 회화는 설교하지 않는다 우리가 신앙을 잃는 순간은 대개 ‘거대한 배반’이 아니라, 작은 떨림을 무시하는 순간이다. 김준영의 회화는 그 작은 떨림을 끝까지 지켜보게 만든다.</p>
                                            <h4 className="text-lg font-normal pt-4">5) 떨림은 ‘느림의 윤리’이자 ‘감각의 회복’이다</h4>
                                            <p>김준영의 작품은 빠르게 소비되지 않는다. 스마트폰 화면에서 스크롤로 넘기기에는 너무 많은 시간이 필요하다. 그의 회화는 관객에게 머무르라고 강요하지 않는다. 다만 머무르지 않으면 보이지 않게 만든다. 가까이 가야 선이 보이고, 시간이 있어야 결이 읽히고, 침묵해야 떨림이 들린다.</p>
                                            <p>이 지점에서 김준영의 회화는 현대미학적으로 중요한 의미를 갖는다. 떨림은 불확실성을 제거하려는 태도가 아니라, 불확실한 상태를 견디는 윤리다. 우리는 명확함과 속도를 강요받는 시대에 살지만, 신앙과 예술은 본질적으로 즉각적 결론을 거부한다. 신앙은 모든 답을 주지 않는다. 예술도 모든 메시지를 주지 않는다. 대신 둘은 질문을 견디게 한다.</p>
                                            <p>김준영의 풍경은 그 질문을 “자연의 모습”이 아니라 “표면의 떨림”으로 남긴다. 떨리는 풍경은 무너지는 풍경이 아니다. 살아 있는 풍경이다. 그리고 그 살아 있음은 오늘날 우리가 가장 잃어가는 감각이기도 하다.</p>
                                            <h4 className="text-lg font-normal pt-4">6) 풍경이 떨릴 때, 믿음은 더 진실해진다-</h4>
                                            <p>김준영의 회화는 자연을 그린 그림이 아니다. 그것은 은혜가 머문 자리, 시간이 내려앉은 흔적, 그리고 신앙이 침묵으로 번역된 풍경이다. 확대해 볼수록 드러나는 수많은 작은 선들의 큰 의미는 언제나 작고 반복되는 순간 속에서 조용히 완성된다고</p>
                                            <p className="font-normal italic">풍경은 떨릴 때 가장 살아 있고,<br/>신앙은 떨릴 때 가장 진실하다.</p>
                                            <p>김준영의 풍경은 그렇게, 오늘도 말없이 우리를 기다리고 있다.</p>
                                        </div>
                                    ) : (
                                        <div className="animate-fade-in space-y-8 text-neutral-800 font-light">
                                            <div className="text-center mb-16">
                                                <h3 className="text-2xl font-light mb-4">단비 오는 날의 신앙고백</h3>
                                                <p className="text-neutral-500 font-normal">이재언 (미술평론가)</p>
                                            </div>
											<p>지금 비가 오는 것이 아닌가. 그렇다. 김준영의 풍경들에는 보슬비 같은 단비가 내리고 있다. 비도 비 나름이지만 그 비는 대지와 우리의 가슴을 촉촉히 적셔주고도 남는 단비이다. 겨우내 언 땅을 해동시켜주며, 생명의 약동을 부추기고 눈부신 신록을 기약하는 단비이다. 능히 감사로써 노래할 자연, 즉 홀로 있는 자의 선물이자 축복이며 은총이다. 심령의 밭을 일구는 작가에게도 역시 그 단비는 피하에까지 스며들어 영혼의 엽록소를 생성하는 데 일조한다. 그야말로 그림에서 느낄 수 있는 아우라(aura)와 韻致가 그윽하고 자욱하며, 나아가 영적인 공감대에 뇌파가 일치하는 순간 미세하고 잔잔한 감동의 음성조차도 들을 수 있을 것이다.</p>
											<p>김준영은 자신의 눈앞에 펼쳐지는 풍경들을 아주 담담하고 담백하게 그려나가고 있다. 계절적으로는 겨울에서 이른봄이 주로 많으며, 소재는 보통의 삶의 주변에서 만나게 되는 가까운 들판이나 주택가, 아파트 단지 등이 주로 등장한다. 그러한 그의 화면은 한결 같이 촉촉한 비가 내리고 있는 것이다. 그 비로 말미암아 얼어붙은 들판에도, 어둑어둑한 콘크리트의 都會 어디에선가 섭리의 은총들이 소리 없이 솟아나고 있음을 우리는 직관으로 경험할 수 있을 것이다. 바로 이러한 소박한 작가의 성취는 그 비 내리는 장면을 아주 자연스럽고도 세련되게 표현하는 것에 기인한다.</p>
											<p>그의 이런 성취는 작가 자신만의 독특한 방법이 오래 전에 창안되고 지속적으로 진화되어 가능했다. 80년대 초부터 비 오는 장면을 표현하기 위해 덜 마른 화면을 빗살처럼 긁어낸다거나 수채화로 줄쳐보거나 하는 단계를 거쳐, 80년대 중반부터 오늘의 마티에르에 이르게 된다. 물감에서 모델링 패스트 등의 재료를 두껍게 캔버스에 점착시킨 후 일정한 수직 스트라이프의 스크래치를 함으로써 마치 엠보싱이 두드러지는 발포벽지와 같은 마티에르를 형성하는 것이다. 그렇게 건조된 표면 위에 오일로 원하는 그림을 그려나간다. 그릴 때는 아무래도 균질의 평면이 아니어서 보통의 캔버스에 그리는 일보다는 힘겨운 일이지만, 탄탄한 데생 능력으로 무난히 재현의 경지를 일구어낸다. 그 스트라이프로 인해 비가 내리는 날의 표현이 자연스럽게 얻어지는 것이다. 또한 그의 이런 독특한 기법이 그림을 더욱 은유적이고 운치 있게 하는 역할을 하고 있음을 두말할 나위도 없다.</p>
											<p>그가 비를 소재로 하여 자기만의 방법에 천착해들어 갔던 이유는 기독교 신앙과도 결부된다. 그의 경험 속에 포착된 모든 사건과 현상, 대상들의 세계는 그야말로 우연적인 것이 하나도 없고, 오직 초월적인 창조주의 뜻으로부터 오는 것이라는 목적론이 강하게 나타난다. 따라서 콘크리트 더미 틈바구니에서 뿌리를 내리는 한 포기의 풀도 놀라운 섭리를 드러내는 것이다. 그것들을 통해 작가의 예민한 영적 직관은 두루 편재하는 사랑과 은총의 음성들을 오차 없이 간파해낸다. 사실 종교적 미의식도 일정한 이데올로기적 체계로서 그 벽을 넘어 미적인 것과의 종합이 그리쉬운 일은 아니지만, 작가는 평범한 소재를 진득하게 파고들어 감으로써 미적인 계기와 종교적인 계기들을 성공적으로 통합하고 조율할 수 있었던 것으로 보인다.</p>
											<p>한층 조형적인 편에서 본다면 굳이 그만의 독자적인 효과나 마티에르가 비로 해석되지 않아도 무방할 것 같다. 모든 이미지에 필터링 혹은 베일을 한 것 같은 은밀하고 온화한 화면 분위기는 보다 다양한 해석에 열려 있을 필요가 있기 때문이다. 수직의 스트라이프에 의해 희미해진 형상들은 비내리는 모습만이 아니다. 육안의 受容器에 비쳐지는 것만이 전부가 아님을 시사하기 충분한 철학적인 도구가 될 수도 있는 것이다. 사실 작가가 비내리는 장면을 더욱 진전된 사실적 재현으로 전환할 수 도 있다. 스트라이프 돌출선을 가볍게 사포질한다거나 하면 더욱 밝은 색의 선들이 드러나 빗줄기를 재현하는 데는 너무나 자연스러운 방법이 될 것이다. 그러나 작가는 더 이상의 작위적인 가공에 나서지 않고 있으며, 그것은 의도했든 의도하지 않았든 폭넓은 의미의 실마리들을 드러내게 되는 것이다.</p>
											<p>한 가지 특이한 것은 그의 그림들이 대부분 이중적인 여백을 가지고 있다는 점이다. 도상의 여백이 하나이며, 도상의 윤곽과 캔버스의 외곽 사이의 여백이 또 다른 하나이다. 도상의 여백과 캔버스 바탕의 여백이 너무 이질적인 까닭에 캔버스에 다른 그림을 오려다 붙인 것처럼 느껴지기도 한다. 그런데 그것을 불규칙한 윤곽-데클 에지라고도 부르는-으로 분리시킴으로써 그 의존상태를 희석시킬 수 있으며, 마치 다른 화면의 것을 절취하여 새로운 화면에 접합시킨, 즉 모종이 引用이나 혹은 借용의 문맥을 이룸으로써 새로운 패러다임의 양식을 은연중 도모하고 있다. 움베르토 에코가 ‘장미의 이름’에서 언급한 ‘다중 번역’(사실은 자신의 창작임에도 불구하고 번역이라 진술 했던 것은 예술적 原典의 정체성과 그 권위에 의문을 던진 것으로 변화된 패러다임의 일단을 강조한 것으로 간주된다)과도 유사한 재현적 질서가 자리 잡고 있다는 사실은 음미할 만한 대목이다.</p>
											<p>예나 지금이나 자신의 신앙을 예술작품으로 표현하고자 하는 작가들은 헤아릴 수 없이 많다. 오늘날 우리 화단에 많은 작가들이 있으며, 그 중 믿음을 가진 작가들이 적지 않다. 많은 신앙 작가들이 마음 속에, 그리고 기도 속에 誓願하는 바가 바로 자신의 신앙과 작품을 접목시키는 일이다. 그렇다고 종래 사원을 장식하였던 종류의 이콘(Icon)이 환경적으로 쉽지 않으며 또 가능하다고 해도 아류일 수밖에 없는 이유로 인해 오늘의 작가들에게는 보다 다른 차원의 접근이 요망되고 있는 것이다. 그것은 다름 아닌 작가 개인의 영적 체험과 미적 체험을 결합시키는 재능과 열정, 노력 등에 의해 성취될 수 있는 일이다. 모든 작품의 행위가 넓게 보면 결국 환경과 자기 삶의 반영이며 자기 신앙의 반영인 까닭에 어느 것 하나가 특별히 의식되는 순간 작위적인 것이 되고, 따라서 부자연스러운 형식의 것이 되기 쉽다.</p>
											<p>이런 점에서 보면 김준영은 그렇게 명시적으로 드러나지는 않지만 담담하고 자연스럽게 자신의 신앙관을 작품에 투영시키는 데 있어 상당한 성취를 거두고 있는 것으로 보인다. 그렇고 그런 이콘들로 이루어진 작위적이고 상투적인 흔적들이 잘 드러나지 않는다는 것은 또한 그의 예술적 기량의 성숙을 확인할 수 있는 대목이라 말할 수 있다. 그러면서도 보다 개성적이고 또한 시대적인 가치의 문제에 소홀하지 않고 있는 것도 평가할 만하다. 그러나 역시 김준영의 그림이 호소력을 갖는 것은 그의 그림이 갖는 건강함이다. 보는 즐거움과 마음을 움직일 수 있는 기본이 흔들림 없이 견지되어 있음이 무엇보다 반갑다.</p>                         
											<hr className="my-20 border-neutral-100" />
                                            <div className="text-center mb-16">
                                                <h3 className="text-2xl font-light mb-4">Prayer on a Rainy Day</h3>
                                                <p className="text-neutral-500 font-normal">Lee, Jae Eon (Art Critic)</p>
                                            </div>
                                           <div className="space-y-6 text-neutral-600 italic font-light">
												<p>Is it raining there? Yes, it is. In the scenery of Kim, Jun Young it's raining like a welcome rain. There are many kinds of rain, but Kim's rain is a gentle one that wets the dry earth and our hearts. Her rain melts the earth frozen throughout the long winter, whispers to the sleeping seeds to wake up, and promises dazzling greenery. Even to the artist who cultivates the field of her soul and spirit, the rain penetrates beneath her skin, helping her soul make chlorophyl. From her paintings not only we feel a deep and profound aura, but we hear a subtle and gentle voice the moment a soul is in sympathy with another soul.</p>
												<p>Kim, Jun Young portrays in a serene and simple way the scenes that she notices in and around her life. Of the season she usually draws scenes of winter through early spring. Subjects of her drawings are nearby fields, residential areas or apartment complexes, which she easily encounters in her daily life. In such pictures it is raining gently all the time. Her rain helps us experience an intuition that grace of the God's providence springs up silently from the frozen fields as well as in the dark, paved urban areas. Such an accomplishment as this artist makes is based on her natural and delicate expression of rainy scenes.</p>
												<p>Her accomplishments are possible today because she created her own unique painting style long ago, which has evolved and continuously developed thus far. Since the early 1980s she has practiced several different techniques such as scratching the surface of the pictures for the effect of slanting rain, and drawing oblique lines with water color. From the middle of the 1980s until today she has put paste on the thick cotton cloth of the canvas, has made long vertical scratches, which makes the canvas look like it's embossed. When the surface is dry, she uses oils to create her painting. It is not easy to paint on the canvas as its surface is not even, but thanks to her superb dessin she successfully represents what she wants to. Those lines produce the natural effect of rainy days. It goes without saying that her unique style contributes to making her pictures more metaphoric and graceful.</p>
												<p>The reason she has adhered to her personal subject of rain is because of her Christian religion. Her paintings forcibly convince us that none of the events and phenomena she has experienced are accidental, but that they come from the will of the supreme creator. Therefore, even a clump of grass that grows from the crevice of the concrete building shows the amazing grace of the Lord. Through her paintings her keen intuition never fails to grasp the voices of love and grace prevailing everywhere. In fact, religious aesthetics is a kind of ideological system, and it is not easy to go beyond its ideology and integrate it into pure aesthetics. However, the artist can successfully integrate and harmonize the two by steadily digging into common and usual aspects.</p>
												<p>In terms of formative aspects, Kim's own unique effects or materials are not to be interpreted in a simple or single way. For it is necessary that the privy and tender atmosphere of her canvas, whose image looks as of filtered or veiled, need to be open to a variety of interpretations. Forms that are dimmed by vertical lines are not rainy scenes alone. It can be a pedantic means to suggest that what physical eyesight catches is not all we can see. Indeed, she can transform the rainy scene into more realistic representations. Sand-papering the embossed stripes can produce a lighter color, and it's a very natural way of representing slanting rain. However, she no longer tries to rely on artificial means, which, whether she intends it or not, reveals clues toward a more comprehensive interpretation.</p>
												<p>What is striking is that most of her pictures have two different kinds of empty spaces. One is space in the picture, and the other is that between the picture and the canvas. The empty space in the picture and that of the canvas are so different from each other that they give us an impression that one picture is superimposed on the other. In fact, her representation look as if it inevitably relied on the angle and lens of a camera. It can lessen the degree of reliance of a viewer by separating it into irregular contours, and intends to create a new paradigm of citation or borrowing that cuts a picture and links it on another. It is noteworthy that representational order, similar to multiple translation that Umberto Eco mentioned in his The Name of the Rose, is set in her works. It was his own creation, but the reason Eco stated it as a translation was to question the identity of artistic canon and its authority, thereby emphasizing the changes made in paradigms.</p>
												<p>From the past until today not a few artists have tried to express their personal religion in the form of artistic works. Currently there are numerous painters in Korea, and many of them have their own religion. What they cherish in their heart and prayers is to link their religion to their works. However, public environment does not allow them to make icons which have adorned churches and temples. Even though they could, what they make cannot but prove something inferior. So they need to create different approaches. That is, talent and passion of a painter are need to make an effort to integrate his or her spiritual experience into that of aesthetics. In a comprehensive sense, all the artistic performances are, after all, the reflection of his environment, life and religion. So when their harmony is broken, artistic performance can be something artificial and unnatural.</p>
												<p>In this regard, Kim, Jun Young seems to have made a great accomplishment in reflecting her religion into her work in a serene and natural way, though not outspokenly. The fact that commonplace and artificial traces are not to be seen in her works confirms us that her artistic skill has become mature. At the same time, it is commendable that she has not neglected her own characteristics as well the value and issue of the current age. However, what makes her works appealing is that they are very sound. It is more than welcome that her basic foundation has been sustained without fail, thereby providing us with the joy of seeing and grace of being moved in our hearts.</p>
											</div>
										   </div>
                                    )}
                                </div>
                            </div>
                        )}

                                        <div className="space-y-6">
                                            <h4 className="text-[10px] uppercase tracking-[0.3em] font-bold text-neutral-400 border-b border-neutral-50 pb-2">Artist Note</h4>
                                            <p className="text-neutral-700 leading-loose text-base font-light whitespace-pre-wrap">{selectedWork.description}</p>
                                        </div>
                                        <div className="pt-6">
                                            <button onClick={() => { setActiveSection('contact'); setSelectedWork(null); }} className="px-12 py-4 bg-black text-white text-[11px] tracking-[0.3em] uppercase rounded-sm">문의</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <button onClick={scrollToTop} className={`fixed bottom-10 right-10 p-4 bg-white border border-neutral-100 shadow-xl rounded-full z-30 transition-all duration-500 ${showScrollTop ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}><Icon name="ArrowUp" size={20} className="text-neutral-400" /></button>

                    <footer className="bg-neutral-50 text-neutral-500 border-t border-neutral-200/60">
                        <div className="max-w-7xl mx-auto px-6 py-20">
                            <div className="grid md:grid-cols-3 gap-16">
                                <div className="space-y-6">
                                    <h3 className="text-sm font-light tracking-[0.3em] uppercase text-neutral-900">{artistInfo.engName}</h3>
                                    <p className="text-xs text-neutral-400 font-light leading-relaxed">"다 표현 못해도 나 표현하리라"<br/>예술을 통해 하나님의 영광과 평안의 메시지를 세상에 전합니다.</p>
                                </div>
                                <div className="space-y-6">
                                    <h4 className="text-[10px] font-bold uppercase tracking-[0.3em] text-neutral-400">Quick Menu</h4>
                                    <div className="flex flex-col gap-3 text-[11px] tracking-widest uppercase">
                                        {navItems.map(m => <button key={m.id} onClick={() => {setActiveSection(m.id); scrollToTop();}} className="text-neutral-500 hover:text-neutral-900 text-left transition-colors">{m.name}</button>)}
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <h4 className="text-[10px] font-bold uppercase tracking-[0.3em] text-neutral-400">Connect</h4>
                                    <p className="text-[10px] text-neutral-400 font-light leading-relaxed mb-4">{artistInfo.address}<br/>{artistInfo.phone}<br/>{artistInfo.email}</p>
                                    <div className="flex gap-4">
                                        <a href={artistInfo.facebook} target="_blank" className="text-neutral-400 hover:text-neutral-900 transition-colors"><Icon name="Facebook" size={20} /></a>
                                        <a href={`mailto:${artistInfo.email}`} className="text-neutral-400 hover:text-neutral-900 transition-colors"><Icon name="Mail" size={20} /></a>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-20 pt-10 border-t border-neutral-200/60 text-[10px] text-neutral-300 tracking-[0.4em] uppercase text-center">© 2024 {artistInfo.engName}. All Grace to God.</div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
